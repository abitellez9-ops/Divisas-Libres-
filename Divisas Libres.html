<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisas Libres & Crypto</title>
    
    <!-- PWA Settings -->
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.25rem;
        }
        .app-card {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border: 1px solid #f1f5f9;
        }
        .section-box {
            border-radius: 2rem;
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .from-style {
            background-color: #f0fdf4; /* Verde Esmeralda */
            border: 2px solid #10b981;
        }
        .to-style {
            background-color: #fff7ed; /* Naranja Bitcoin */
            border: 2px solid #f59e0b;
        }
        .swap-trigger {
            background: white;
            border: 3px solid #f8fafc;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -27px auto;
            position: relative;
            z-index: 30;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .swap-trigger:active {
            transform: scale(0.9) rotate(180deg);
        }
        input {
            background: transparent;
            border: none;
            font-size: 2.2rem;
            font-weight: 900;
            width: 100%;
            outline: none;
            color: #064e3b;
        }
        .bitcoin-icon {
            color: #f59e0b;
            font-size: 2.2rem;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="text-center mb-8">
        <div class="flex justify-center items-center gap-2 mb-1">
            <i class="fa-solid fa-bolt-lightning text-amber-500"></i>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">Divisas Libres</h1>
        </div>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Fiat & Bitcoin Edition</p>
    </div>

    <div class="space-y-4">
        <!-- ORIGEN -->
        <div class="section-box from-style" id="box-from">
            <div class="flex justify-between items-center mb-4">
                <span class="text-emerald-700 text-[10px] font-black uppercase tracking-widest" id="label-from">Entrego</span>
                <select id="select-from" class="bg-white/90 rounded-xl px-3 py-1.5 text-sm font-bold border-none outline-none shadow-sm cursor-pointer"></select>
            </div>
            <div class="flex items-center gap-4">
                <div id="icon-from" class="w-12 h-12 rounded-full flex items-center justify-center bg-white shadow-inner overflow-hidden"></div>
                <input type="number" id="input-amount" value="1" inputmode="decimal">
            </div>
        </div>

        <!-- SWAP -->
        <div class="swap-trigger" id="btn-swap">
            <i class="fa-solid fa-shuffle text-amber-600"></i>
        </div>

        <!-- DESTINO -->
        <div class="section-box to-style" id="box-to">
            <div class="flex justify-between items-center mb-4">
                <span class="text-amber-700 text-[10px] font-black uppercase tracking-widest" id="label-to">Recibo</span>
                <select id="select-to" class="bg-white/90 rounded-xl px-3 py-1.5 text-sm font-bold border-none outline-none shadow-sm cursor-pointer"></select>
            </div>
            <div class="flex items-center gap-4">
                <div id="icon-to" class="w-12 h-12 rounded-full flex items-center justify-center bg-white shadow-inner overflow-hidden"></div>
                <div id="display-result" class="text-3xl font-black text-amber-900 truncate">0.00</div>
            </div>
        </div>
    </div>

    <!-- Info y Leyenda con la firma personalizada -->
    <div class="mt-8 text-center px-2">
        <div id="rate-info" class="text-[11px] font-extrabold text-slate-500 bg-slate-50 py-3 px-4 rounded-2xl mb-8 border border-slate-100">
            Sincronizando con el mercado...
        </div>
        
        <div class="border-t border-slate-100 pt-6">
            <p class="text-[11px] text-slate-400 leading-relaxed font-medium">
                <i class="fa-solid fa-heart text-red-400 mr-1"></i>
                <span class="text-slate-600 font-bold">Conocimiento Abierto.</span> 
                Esta herramienta es gratuita y libre para todos, siempre :.
            </p>
        </div>

        <button id="btn-share" class="mt-6 flex items-center justify-center w-full gap-2 py-4 rounded-2xl bg-slate-900 text-white font-bold text-xs uppercase tracking-widest hover:bg-slate-800 transition-all active:scale-95 shadow-xl shadow-slate-200">
            <i class="fa-solid fa-paper-plane text-[10px]"></i> Compartir con la familia
        </button>
    </div>
</div>

<script>
    const currencies = {
        "BTC": { name: "Bitcoin", flag: null },
        "USD": { name: "Dólar US", flag: "US" },
        "MXN": { name: "Peso MX", flag: "MX" },
        "EUR": { name: "Euro", flag: "EU" },
        "ARS": { name: "Peso AR", flag: "AR" },
        "COP": { name: "Peso CO", flag: "CO" },
        "CLP": { name: "Peso CL", flag: "CL" },
        "PEN": { name: "Sol PE", flag: "PE" },
        "BRL": { name: "Real BR", flag: "BR" },
        "UYU": { name: "Peso UY", flag: "UY" }
    };
    
    let rates = {};
    const selectFrom = document.getElementById('select-from');
    const selectTo = document.getElementById('select-to');
    const inputAmt = document.getElementById('input-amount');
    const displayRes = document.getElementById('display-result');
    const rateInfo = document.getElementById('rate-info');
    const btnShare = document.getElementById('btn-share');

    Object.keys(currencies).forEach(c => {
        selectFrom.add(new Option(c, c));
        selectTo.add(new Option(c, c));
    });

    selectFrom.value = "BTC";
    selectTo.value = "MXN";

    async function init() {
        try {
            // Obtener Fiat
            const resFiat = await fetch('https://open.er-api.com/v6/latest/USD');
            const dataFiat = await resFiat.json();
            rates = dataFiat.rates;

            // Obtener BTC (CoinGecko)
            const resBtc = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const dataBtc = await resBtc.json();
            const btcUsd = dataBtc.bitcoin.usd;
            
            rates["BTC"] = 1 / btcUsd;

            update();
        } catch (e) {
            rateInfo.innerText = "Error de conexión. Reintentando...";
            setTimeout(init, 4000);
        }
    }

    function update() {
        if (!rates[selectFrom.value] || !rates[selectTo.value]) return;
        
        const from = selectFrom.value;
        const to = selectTo.value;
        const amt = parseFloat(inputAmt.value) || 0;
        
        const rate = rates[to] / rates[from];
        const result = amt * rate;
        
        const decimals = to === "BTC" ? 8 : 2;
        displayRes.innerText = result.toLocaleString(undefined, { 
            minimumFractionDigits: decimals, 
            maximumFractionDigits: decimals 
        });
        
        rateInfo.innerText = `1 ${from} = ${rate.toLocaleString(undefined, {maximumFractionDigits: 8})} ${to}`;
        
        renderIcon('icon-from', from);
        renderIcon('icon-to', to);

        updateBoxStyle('box-from', 'label-from', from);
        updateBoxStyle('box-to', 'label-to', to);
    }

    function renderIcon(elementId, code) {
        const el = document.getElementById(elementId);
        if (code === "BTC") {
            el.innerHTML = `<i class="fa-brands fa-bitcoin bitcoin-icon"></i>`;
        } else {
            el.innerHTML = `<img src="https://flagsapi.com/${currencies[code].flag}/flat/64.png" class="w-8 h-8 object-contain">`;
        }
    }

    function updateBoxStyle(boxId, labelId, code) {
        const box = document.getElementById(boxId);
        const label = document.getElementById(labelId);
        if (code === "BTC") {
            box.className = "section-box to-style";
            label.className = "text-amber-700 text-[10px] font-black uppercase tracking-widest";
        } else {
            box.className = "section-box from-style";
            label.className = "text-emerald-700 text-[10px] font-black uppercase tracking-widest";
        }
    }

    inputAmt.addEventListener('input', update);
    selectFrom.addEventListener('change', update);
    selectTo.addEventListener('change', update);
    
    document.getElementById('btn-swap').addEventListener('click', () => {
        const t = selectFrom.value;
        selectFrom.value = selectTo.value;
        selectTo.value = t;
        update();
    });

    btnShare.addEventListener('click', () => {
        const link = window.location.href;
        const text = `Te comparto esta app de Divisas y Bitcoin que hice. Conocimiento Libre siempre :. ${link}`;
        if (navigator.share) {
            navigator.share({ title: 'Divisas Libres', text: text, url: link });
        } else {
            navigator.clipboard.writeText(text);
            alert("¡Enlace copiado! Ya puedes pegarlo en WhatsApp :.");
        }
    });

    init();
</script>

</body>
</html>
